name: cross-system report
description: File a seam item that spans two or more skills (id bridging, taxonomy alignment, converging definitions).
title: "[cross] "
labels: [feedback]
body:
  - type: markdown
    attributes:
      value: |
        File a **cross-system** seam item — something that lives between skills rather than inside one: id bridging, taxonomy alignment, a definition that must converge across sources. Front doors: https://data-source-skills.vercel.app/{rebl3,red2,aerie,redshift}/skill

        **Standing rule:** describe the shape of the problem with field NAMES, never data VALUES. Do not paste a person-identifying record (a real name, email, or home address).
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - data defect
        - "skill defect: incomplete"
        - "skill defect: non-compliant"
        - "skill defect: confusing"
        - ask / feedback
    validations:
      required: true
  - type: input
    id: sources
    attributes:
      label: Sources involved
      description: Which skills does this seam span?
      placeholder: "e.g. rebl3 + redshift; or all four"
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: The surfaces on each side — files + sections, or tables / fields.
      placeholder: "e.g. rebl3 market_id vs redshift rhodes_sites.market handle; dim_school.school_id vs fct_pl.school_id"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: What you ran and what you saw. Field NAMES only — never data values.
      placeholder: "0 of 68 three-way sites agreed on capacity across rebl3/red2/aerie pre-open"
    validations:
      required: true
  - type: input
    id: doc-sha
    attributes:
      label: Doc SHA(s)
      description: The X-Doc-SHA256(s) you read (optional).
    validations:
      required: false
