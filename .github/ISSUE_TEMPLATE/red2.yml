name: red2 report
description: File a defect or ask against the red2 data source skill.
title: "[red2] "
labels: [red2]
body:
  - type: markdown
    attributes:
      value: |
        Report a defect or ask for the **red2** skill. Front door: https://data-source-skills.vercel.app/red2/skill

        **Standing rule:** describe the shape of the problem with field NAMES, never data VALUES. Do not paste a person-identifying record (a real name, email, or home address).
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - data defect
        - "skill defect: incomplete"
        - "skill defect: non-compliant"
        - "skill defect: confusing"
        - ask / feedback
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where it lives — a file + section, or a table / field / view.
      placeholder: "e.g. red2/DICTIONARY.md trap 3; or the today view, kind=stuck"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: What you ran and what you saw. Field NAMES only — never data values.
      placeholder: "GET /objects/today?filter={kind:stuck} -> 12/12 rows carry a non-null blocker (docs say null by design)"
    validations:
      required: true
  - type: input
    id: doc-sha
    attributes:
      label: Doc SHA
      description: The X-Doc-SHA256 you read (optional).
    validations:
      required: false
