name: aerie report
description: File a defect or ask against the aerie data source skill.
title: "[aerie] "
labels: [aerie]
body:
  - type: markdown
    attributes:
      value: |
        Report a defect or ask for the **aerie** skill. Front door: https://data-source-skills.vercel.app/aerie/skill

        **Standing rule:** describe the shape of the problem with field NAMES, never data VALUES. Do not paste a person-identifying record (a real name, email, or home address).
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - data defect
        - "skill defect: incomplete"
        - "skill defect: non-compliant"
        - "skill defect: confusing"
        - ask / feedback
    validations:
      required: true
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Where it lives — a file + section, or a table / field.
      placeholder: "e.g. aerie/DICTIONARY.md § operations_real_estate; or campusRag field"
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: What you ran and what you saw. Field NAMES only — never data values.
      placeholder: "operations_real_estate.capacity disagrees with operating currentCapacity on 59/62 matched sites"
    validations:
      required: true
  - type: input
    id: doc-sha
    attributes:
      label: Doc SHA
      description: The X-Doc-SHA256 you read (optional).
    validations:
      required: false
